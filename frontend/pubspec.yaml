name: news_app_clean_architecture
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  #icon
  ionicons: ^0.1.2

  #state management
  flutter_bloc: ^8.1.2

  #comparing dart objects
  equatable: ^2.0.5

  #service locator
  get_it: ^7.6.0

  #Database
  floor: any

  #make request to api
  retrofit: ^3.0.1

  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.13.3
  firebase_storage: ^11.5.5

  # Image picker
  image_picker: ^1.0.7

  # Shimmer loading
  shimmer: ^3.0.0

  # Sharing
  share_plus: ^7.2.1

  # Firebase Auth
  firebase_auth: ^4.16.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Shared preferences (drafts)
  shared_preferences: ^2.2.2


  #chached image 
  cached_network_image: ^3.2.0
  google_generative_ai: ^0.4.7
  google_fonts: ^6.2.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  retrofit_generator: 3.0.1+1
  floor_generator: 1.2.0
  build_runner: 2.1.2
  mocktail: ^1.0.0
  

flutter:

  uses-material-design: true
